name: Redeploy Jarvis

# When an approved self-edit to Jarvis's identity lands on main, re-apply its agent
# definition so the new version goes live. Memory commits (jarvis/MEMORY.md) do NOT
# trigger this — only the agent definition does.
on:
  push:
    branches: [main]
    paths: ["jarvis/jarvis.agent.yaml"]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the ant CLI
        run: npm install -g @anthropic-ai/ant
      - name: Re-apply Jarvis from its definition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ant beta:agents update --id "${{ secrets.JARVIS_AGENT_ID }}" < jarvis/jarvis.agent.yaml
