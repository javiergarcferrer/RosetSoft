name: Deploy Edge Functions

# Deploys all Supabase Edge Functions (per supabase/config.toml) to the linked
# project when function code or config lands on main — replaces manual
# `supabase functions deploy` / dashboard pasting.
#
# One-time setup — add two repo secrets (GitHub repo → Settings → Secrets and
# variables → Actions → New repository secret):
#   SUPABASE_ACCESS_TOKEN  (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_PROJECT_ID    (Supabase → Project Settings → General → Reference ID)
# Then push a function change, or run this workflow manually from the Actions tab.

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
