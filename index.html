<!doctype html>
<html lang="es-DO">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: on Chrome/Android the soft keyboard
         RESIZES the viewport (so layout reflows above it) instead of overlaying
         content. iOS ignores it and is handled via visualViewport in JS
         (lib/useVirtualKeyboard). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- theme-color stays the dark ink of the mobile topbar (always-dark
         chrome) in BOTH themes, so the iOS status bar / Android URL bar keep
         matching the bar right below them. color-scheme advertises both so the
         UA themes native controls/scrollbars once `.dark` is set. -->
    <meta name="theme-color" content="#171612" />
    <meta name="color-scheme" content="light dark" />

    <!-- Anti-FOUC theme boot. Inline + synchronous in <head> so `.dark` lands
         on <html> BEFORE first paint — no flash of the wrong theme. Must mirror
         src/lib/theme.js exactly (same key, same rules): explicit 'dark'/'light'
         override wins; otherwise follow the OS; public client routes (the shared
         quote link and the storefront) are always light, since they're the
         dealer's "paper" shown on a customer's device. -->
    <script>
      (function () {
        try {
          var hash = location.hash || '';
          var path = location.pathname || '';
          var isPublic = path === '/configurator' || path === '/configurator/' || hash.indexOf('#/q/') === 0 || hash.indexOf('#/contrato/') === 0 || hash.indexOf('#/cuenta/') === 0 || hash.indexOf('#/tienda') === 0 || hash.indexOf('#/embed') === 0 || hash.indexOf('#/eliminar-datos') === 0;
          var pref = null;
          try { pref = localStorage.getItem('rs.theme'); } catch (e) {}
          var dark =
            !isPublic &&
            (pref === 'dark' ||
              ((pref === null || pref === 'system') &&
                window.matchMedia('(prefers-color-scheme: dark)').matches));
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>

    <!-- iOS / Android standalone behavior when "Add to Home Screen" is used.
         viewport-fit=cover above is what makes env(safe-area-inset-*) return
         non-zero on iPhones with a notch / Dynamic Island.

         status-bar-style is "black" (opaque dark bar), NOT "black-translucent".
         black-translucent lets content paint under the status bar, but iOS then
         sizes the standalone web viewport one status-bar-height SHORT and anchors
         it at the top — so a fixed bottom-0 bar (the quote TotalsDock) lands above
         the physical screen edge and the manifest background_color shows through
         as a dead strip beneath it. "black" makes iOS lay the viewport out below
         the status bar and fill all the way to the physical bottom, so the dock is
         truly pinned to the edge. The bar reads white-on-near-black, matching our
         dark ink-900 topbar that sits right below it. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="ALCOVER" />
    <meta name="format-detection" content="telephone=no" />

    <title>ALCOVER · Su propuesta de diseño</title>
    <meta name="description" content="Telas, dimensiones y total. Ábrela para cotizar en vivo." />

    <!-- Link preview (WhatsApp / iMessage / Facebook / Twitter). The app is a
         hash-routed SPA, so crawlers (which ignore everything after #) only ever
         see THIS static head — every shared /#/q/<token> link therefore shows
         one branded card, not a per-quote one. The description speaks to the
         client receiving the proposal. og:image is an absolute URL because
         WhatsApp rejects relative ones; it's set at build time from
         VITE_PUBLIC_ORIGIN (Vercel) and falls back to the production host.
         The image MUST be a BASELINE jpeg — WhatsApp renders progressive
         JPEGs as garbled noise in the preview card (tests/ogImage.test.js
         pins this). The filename is bumped (…-v2) on every re-encode fix:
         WhatsApp caches the card per-URL for weeks, so a fix must change the
         URL to bust that cache.
         There is deliberately NO og:url tag: Meta's crawler keys its cached
         link object by the og:url CANONICAL, so one stale canonical object
         swallowed every quote link (any domain, any cache-buster) and kept
         serving the broken card. Without it each fetched URL is its own
         object (ogImage.test.js pins the absence too). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ALCOVER" />
    <meta property="og:locale" content="es_DO" />
    <meta property="og:title" content="Su propuesta de diseño · ALCOVER" />
    <meta property="og:description" content="Telas, dimensiones y total. Ábrela para cotizar en vivo." />
    <meta property="og:image" content="%VITE_PUBLIC_ORIGIN%/og-card-v2.jpg" />
    <meta property="og:image:secure_url" content="%VITE_PUBLIC_ORIGIN%/og-card-v2.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ALCOVER — Su propuesta de diseño, con intención." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Su propuesta de diseño · ALCOVER" />
    <meta name="twitter:description" content="Telas, dimensiones y total. Ábrela para cotizar en vivo." />
    <meta name="twitter:image" content="%VITE_PUBLIC_ORIGIN%/og-card-v2.jpg" />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
  </head>
  <body class="bg-ink-50 text-ink-900 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
