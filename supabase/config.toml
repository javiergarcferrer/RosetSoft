# Supabase project config. Used by the GitHub integration's auto-deploy
# pipeline on push to `main`: it applies each function's `verify_jwt` setting
# AND deploys every Edge Function declared here. A function only auto-deploys
# if it has a `[functions.<name>]` block below.
#
# Per-function `verify_jwt` toggles whether Supabase's gateway checks
# the request's JWT *before* the function code runs. We set it to
# false for `invite-user` because the function does its OWN JWT
# verification + admin-role check internally (see
# functions/invite-user/index.ts) — leaving the gateway-level check
# enabled would (1) be redundant for our auth needs and (2) break the
# browser's CORS preflight, since browsers don't send the
# Authorization header on the OPTIONS request the gateway would
# require it on. That second part is what produces the cryptic
# "Load failed" error the admin sees when trying to invite a user
# from /admin/users: the OPTIONS hits the gateway, gets a 401, CORS
# preflight fails, and the actual POST never even goes out.
#
# Functions not listed here keep Supabase's default (verify_jwt =
# true). Add a new `[functions.<name>]` block when you need to opt
# out per-function.

[functions.invite-user]
verify_jwt = false

[functions.delete-user]
verify_jwt = false

# bpd-rate verifies the caller's JWT itself (so the CORS preflight, which
# carries no Authorization header, isn't rejected by the gateway).
[functions.bpd-rate]
verify_jwt = false

# swatch-proxy re-serves a public Ligne Roset swatch image with CORS headers
# so the browser-side PDF generator can embed it. It's a public, read-only
# image proxy locked to the LR swatch CDN — no auth needed, and the gateway
# must NOT require a JWT, or the PDF's plain image fetch (which carries no
# Authorization header) would be rejected before the function runs.
[functions.swatch-proxy]
verify_jwt = false

# quote-share backs the public, interactive client quote link. It's used
# logged-out, so the gateway must not require a JWT; the function itself gates
# on the secret share token and runs with the service role.
[functions.quote-share]
verify_jwt = false

# hl-track verifies the caller's JWT itself (same reason as bpd-rate) and
# proxies Hapag-Lloyd's Track & Trace API, keeping HL_CLIENT_ID/SECRET
# server-side.
[functions.hl-track]
verify_jwt = false

# lr-catalog reads a public Ligne Roset product page + its catalog AJAX
# endpoints and returns the offered fabrics/colors as JSON for the Materials
# importer + the quote builder's per-model fabric lookup. Read-only and locked
# to ligne-roset.com (no SSRF). It verifies the caller's JWT ITSELF
# (auth.getUser on the Authorization header) so anonymous internet traffic can't
# drive the expensive { all:true } sitemap sweep. Gateway check off (verify_jwt
# = false) for the same reason as bpd-rate: the browser's CORS preflight carries
# no Authorization header, so a gateway check would reject it before the
# function runs.
[functions.lr-catalog]
verify_jwt = false

# rnc-lookup resolves a taxpayer's fiscal name from their RNC/cédula against the
# public DGII-mirror registry (rnc.megaplus.com.do) so the app can auto-fill
# suppliers/customers for clean 606/607 reporting. Read-only, locked to that one
# endpoint + a sanitized numeric input (no SSRF). No auth needed; verify_jwt
# must be false so the browser's CORS preflight isn't rejected.
[functions.rnc-lookup]
verify_jwt = false

# togo-embed backs the public, no-login Togo configurator widget (embedded in the
# dealer's website via an iframe). Used logged-out, so the gateway must not require
# a JWT; it runs with the service role and exposes only public-safe data (retail
# prices, margin baked) on GET, and writes a DRAFT quote (a lead) on POST.
[functions.togo-embed]
verify_jwt = false

# store backs the public, no-login storefront ("Tienda"). Used logged-out, so
# the gateway must not require a JWT; it runs with the service role and returns
# only public-safe catalog data (product names, photos, retail prices) for the
# house-account quotes the dealer designates in Settings. Margin is baked into
# the prices; no cost/margin leaves the server.
[functions.store]
verify_jwt = false

# ecf-send signs an e-CF and transmits it to the DGII (dgii-ecf). It reads the
# team's .p12 from the write-only ecf_credentials table via the service role.
# It verifies the caller ITSELF (auth.getUser on the Authorization header —
# rejecting the anon key, which a gateway verify_jwt=true would happily pass,
# since the anon key is a valid JWT). Gateway check off for the same reason as
# invite-user: the browser's CORS preflight carries no Authorization header.
[functions.ecf-send]
verify_jwt = false

# shopify-sync mirrors in-stock inventory into the Shopify catalog. Called by a
# signed-in team member (after a liquidation lands stock, a sale empties it, or a
# manual "Sincronizar"). It verifies the caller ITSELF (auth.getUser on the
# Authorization header — rejecting the anon key, which a gateway verify_jwt=true
# would happily pass, since the anon key is a valid JWT). Gateway check off for
# the same reason as invite-user: the browser's CORS preflight carries no
# Authorization header. It reads the Admin token from the write-only
# shopify_config table via the service role; the token never reaches the browser.
[functions.shopify-sync]
verify_jwt = false

# wa-send sends outbound WhatsApp (Cloud API) for the quote editor, Settings
# connection test and CRM inbox. It verifies the caller ITSELF (auth.getUser on
# the Authorization header — rejecting the anon key, which a gateway
# verify_jwt=true would happily pass, since the anon key is a valid JWT).
# Gateway check off for the same reason as invite-user: the browser's CORS
# preflight carries no Authorization header. It reads the Meta access token
# from the write-only whatsapp_config table via the service role; the token
# never reaches the browser.
[functions.wa-send]
verify_jwt = false

# wa-webhook is called by META, not the browser — Meta sends no Supabase JWT,
# so the gateway must not require one. POST payloads are authenticated by the
# X-Hub-Signature-256 HMAC (App Secret from the write-only whatsapp_config);
# the GET registration handshake matches settings.whatsapp_verify_token.
[functions.wa-webhook]
verify_jwt = false

# claude-chat is the JARVIS uplink: it relays the dashboard console to the
# Claude API (Anthropic) and persists the conversation in claude_messages.
# Verifies the caller ITSELF (auth.getUser on the Authorization header) —
# gateway check off so the CORS preflight passes, same as wa-send. It reads
# the Anthropic API key from the write-only claude_config table via the
# service role; the key never reaches the browser.
[functions.claude-chat]
verify_jwt = false

# wa-draft suggests a reply for the WhatsApp inbox: it relays a compact
# conversation transcript to the Claude API (Anthropic) and returns a draft for
# the dealer to review and send themselves — it never sends or persists.
# Verifies the caller ITSELF (auth.getUser on the Authorization header) — gateway
# check off so the CORS preflight passes, same as wa-send. Reads the Anthropic
# key from the write-only claude_config table via the service role.
[functions.wa-draft]
verify_jwt = false

# meta-social links + reads the team's Facebook Page / Instagram / Ads data
# for the JARVIS social pulse. Verifies the caller ITSELF (auth.getUser on the
# Authorization header) — gateway check off so the CORS preflight passes, same
# as wa-send. It reads the Meta token from the write-only meta_social_config
# table via the service role; the token never reaches the browser.
[functions.meta-social]
verify_jwt = false

# google-api — Gmail (send) + Google Drive (folders/upload/list) on ONE Google
# OAuth account. Verifies the caller ITSELF (auth.getUser on the Authorization
# header) — gateway check off so the CORS preflight passes, same as wa-send. The
# OAuth client creds + refresh token live in the write-only google_oauth_config
# table (service role only); the access token is a server-owned cache and never
# reaches the browser. The GET callback is the public OAuth redirect.
[functions.google-api]
verify_jwt = false

# Instagram webhooks (comments + mentions). Public callback — Meta calls it
# unauthenticated; it verifies the hub token and persists to ig_events.
[functions.meta-webhook]
verify_jwt = false

# The scheduling-engine worker. pg_cron pings it with the service-role key;
# its ensureCron action self-registers that cron job.
[functions.ig-publish-worker]
verify_jwt = false
